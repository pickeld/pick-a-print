<div class="collection-manage-actions">
  <button
    type="button"
    class="btn btn-ghost collection-manage-btn"
    data-collection-add
    aria-label="New collection"
    aria-pressed="false"
    title="New collection"
    data-label-open="New"
    data-label-close="Cancel"
  >
    <span class="collection-manage-btn__label">New</span>
    <svg class="collection-manage-btn__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 5v14"></path>
      <path d="M5 12h14"></path>
    </svg>
  </button>
  <button
    type="button"
    class="btn btn-ghost collection-manage-btn collection-manage-edit-btn edit-mode-toggle"
    data-collection-edit
    aria-label="Edit collections"
    aria-pressed="false"
    title="Edit collections"
    data-label-edit="Edit"
    data-label-done="Done"
  >
    <span class="edit-mode-toggle__label collection-manage-btn__label">Edit</span>
    <svg class="collection-manage-btn__icon icon-pencil" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 20h9"></path>
      <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"></path>
    </svg>
    <svg class="collection-manage-btn__icon icon-done" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" hidden>
      <path d="M20 6 9 17l-5-5"></path>
    </svg>
  </button>
</div>
