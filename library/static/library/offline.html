<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0b0d10">
  <title>Offline — Pick-a-Print</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b0d10;
      color: #e8eaed;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 1.5rem;
      text-align: center;
    }
    h1 { font-size: 1.35rem; margin: 0 0 0.5rem; }
    p { color: #8b93a7; margin: 0 0 1.25rem; max-width: 28rem; }
    button {
      background: #f59e0b;
      color: #0b0d10;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div>
    <h1>You’re offline</h1>
    <p>Pick-a-Print needs a network connection for your library. Cached pages may still be available when you reconnect.</p>
    <button type="button" onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
