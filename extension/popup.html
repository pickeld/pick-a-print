<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pick-a-Print</title>
  <style>
    body { font-family: Inter, system-ui, sans-serif; margin: 0; padding: 16px; width: 300px; background: #12151a; color: #e8eaed; }
    h1 { font-size: 14px; margin: 0 0 12px; }
    label { display: block; font-size: 11px; color: #8b93a7; margin-bottom: 4px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 12px; border-radius: 6px; border: 1px solid #2a3040; background: #181c24; color: #e8eaed; }
    button { width: 100%; padding: 10px; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; }
    button.primary { background: #f59e0b; color: #111; margin-bottom: 8px; }
    button.secondary { background: #2a3040; color: #e8eaed; }
    button:disabled { opacity: 0.6; cursor: wait; }
    .status { font-size: 12px; margin-top: 10px; min-height: 18px; }
    .status.ok { color: #22c55e; }
    .status.err { color: #ef4444; }
    a { color: #f59e0b; font-size: 12px; }
    hr { border: none; border-top: 1px solid #2a3040; margin: 14px 0; }
  </style>
</head>
<body>
  <h1>Pick-a-Print</h1>
  <button id="saveTab" class="primary" type="button">Save current tab</button>

  <hr>

  <label for="apiBase">API Base URL</label>
  <input id="apiBase" placeholder="http://your-server:8002/api" />
  <label for="apiToken">API Token</label>
  <input id="apiToken" type="password" placeholder="Paste from Settings page" />
  <button id="saveSettings" class="secondary" type="button">Save settings</button>
  <div class="status" id="status"></div>
  <p style="margin-top:12px"><a id="settingsLink" href="#" target="_blank" rel="noopener">Open Settings →</a></p>
  <script src="popup.js"></script>
</body>
</html>
