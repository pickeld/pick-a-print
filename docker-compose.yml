services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: pick_a_print
      POSTGRES_USER: pick_a_print
      POSTGRES_PASSWORD: pick_a_print
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pick_a_print -d pick_a_print"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - .:/app
      - media_data:/app/media
      - scan_data:/data/jobs
    extra_hosts:
      - "jetson.pickel.me:192.168.127.240"
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-docker-secret-change-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,192.168.127.252,print.pickel.me
      CSRF_TRUSTED_ORIGINS: https://print.pickel.me
      USE_X_FORWARDED_PROTO: "true"
      DATABASE_URL: postgres://pick_a_print:pick_a_print@db:5432/pick_a_print
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      PIPELINE_DATA_DIR: /data/jobs
      SCAN_CELERY_BROKER_URL: redis://redis:6379/1
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: scans
      THINGIVERSE_API_TOKEN: ${THINGIVERSE_API_TOKEN:-}
      BAMBU_LAB_TOKEN: ${BAMBU_LAB_TOKEN:-}
      MYMINIFACTORY_API_KEY: ${MYMINIFACTORY_API_KEY:-}
      CLOUDFLARE_PROXY: "true"
      CLOUDFLARE_MAX_UPLOAD_MB: "100"
      SCAN_MAX_UPLOAD_MB: "200"
      CHUNK_UPLOAD_SIZE_MB: "25"
      STATIC_ASSET_VERSION: "3"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  library-worker:
    build: .
    restart: unless-stopped
    command: celery -A config worker -l info
    volumes:
      - .:/app
      - media_data:/app/media
    environment:
      DEBUG: "True"
      SECRET_KEY: dev-docker-secret-change-in-production
      DATABASE_URL: postgres://pick_a_print:pick_a_print@db:5432/pick_a_print
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      THINGIVERSE_API_TOKEN: ${THINGIVERSE_API_TOKEN:-}
      BAMBU_LAB_TOKEN: ${BAMBU_LAB_TOKEN:-}
      MYMINIFACTORY_API_KEY: ${MYMINIFACTORY_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    restart: unless-stopped
    ports:
      - "${SCAN_API_PORT:-8001}:8001"
    volumes:
      - ./app:/app/app
      - scan_data:/data/jobs
    environment:
      PIPELINE_DATA_DIR: /data/jobs
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL: postgres://pick_a_print:pick_a_print@db:5432/pick_a_print
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: scans
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    profiles: ["local-worker"]
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    restart: unless-stopped
    command: >
      celery -A app.workers.celery_app worker -l info -Q celery --concurrency=1
    volumes:
      - ./app:/app/app
      - scan_data:/data/jobs
    environment:
      PIPELINE_DATA_DIR: /data/jobs
      QT_QPA_PLATFORM: offscreen
      COLMAP_MAX_IMAGE_SIZE: ${COLMAP_MAX_IMAGE_SIZE:-1600}
      FFMPEG_MAX_WIDTH: ${FFMPEG_MAX_WIDTH:-1600}
      COLMAP_SIFT_THREADS: ${COLMAP_SIFT_THREADS:-2}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: scans
    depends_on:
      redis:
        condition: service_healthy
    # GPU (Linux + NVIDIA Container Toolkit only):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    # gpus: all

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${SCAN_FRONTEND_PORT:-3000}:80"
    volumes:
      - ./services/frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  postgres_data:
  media_data:
  minio_data:
  scan_data:
