# Photogrammetry stack — API, GPU worker, Redis, PostgreSQL, MinIO
# Usage: docker compose -f docker-compose.photogrammetry.yml up --build
#
# Requires NVIDIA Container Toolkit for GPU worker:
#   docker run --rm --gpus all nvidia/cuda:12.4.1-base-ubuntu22.04 nvidia-smi

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: photogrammetry
      POSTGRES_USER: photogrammetry
      POSTGRES_PASSWORD: photogrammetry
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photogrammetry -d photogrammetry"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "${SCAN_API_PORT:-8001}:8001"
    volumes:
      - ./app:/app/app
      - scan_data:/data/jobs
    environment:
      PIPELINE_DATA_DIR: /data/jobs
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DATABASE_URL: postgres://photogrammetry:photogrammetry@postgres:5432/photogrammetry
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: scans
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    command: >
      celery -A app.workers.celery_app worker -l info -Q celery --concurrency=1
    volumes:
      - ./app:/app/app
      - scan_data:/data/jobs
    environment:
      PIPELINE_DATA_DIR: /data/jobs
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: scans
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # For local Compose without deploy section support, uncomment:
    # gpus: all

  frontend:
    image: nginx:alpine
    ports:
      - "${SCAN_FRONTEND_PORT:-3000}:80"
    volumes:
      - ./services/frontend:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  pg_data:
  minio_data:
  scan_data:
